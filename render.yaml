services:
  - type: web
    name: stargazing-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: CACHE_ONLY_FORECASTS
        value: "true"
      - key: DEPLOYMENT_MODE
        value: render
      - key: FORECAST_CACHE_REMOTE_ENABLED
        value: "true"
