name: Refresh Forecast Cache

# Runs at 06:00, 14:00, 22:00 BST (05:00, 13:00, 21:00 UTC) — 4 hours after
# each Windows scheduled run (02:00, 10:00, 18:00 BST) so the two never overlap.
# GitHub Actions uses a different IP than the Windows machine, giving a separate
# Open-Meteo quota: 3 more sweeps/day on top of the Windows 3 = 6 total.
#
# Note: cron times are UTC. In winter (GMT) these fire 1 hour earlier BST-equivalent.

on:
  schedule:
    - cron: '0 5 * * *'    # 06:00 BST / 05:00 UTC
    - cron: '0 13 * * *'   # 14:00 BST / 13:00 UTC
    - cron: '0 21 * * *'   # 22:00 BST / 21:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh forecast cache
        run: python scripts/refresh_forecast_cache.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add forecast_cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update forecast cache $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin main
            git push origin main
          fi
