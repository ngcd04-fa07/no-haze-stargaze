# LEGACY — Render deployment only.
# This workflow is NOT used for the Windows self-hosted deployment.
# For Windows: use scripts/refresh_forecasts_local.py via Task Scheduler instead.
# See deploy/windows/README.md for the current production setup.
name: Update Forecast Cache (Render/Legacy)

on:
  schedule:
    - cron: '*/45 * * * *'  # every 45 minutes; only fetches sites searched in last 48 h
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write           # needed to create/update GitHub Releases

jobs:
  update-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch forecast data
        run: python scripts/fetch_forecast.py

      - name: Validate forecast_cache.json
        run: |
          python3 - <<'EOF'
          import json, sys
          try:
              with open("forecast_cache.json") as f:
                  d = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError) as e:
              print(f"FAIL: forecast_cache.json missing or invalid JSON: {e}")
              sys.exit(1)
          data = d.get("data", {})
          site_count = d.get("site_count", len(data))
          if not data or len(data) == 0:
              print("FAIL: forecast_cache.json has no data entries — refusing upload.")
              sys.exit(1)
          if site_count == 0:
              print("FAIL: forecast_cache.json has site_count=0 — refusing upload.")
              sys.exit(1)
          print(f"OK: {len(data)} sites, site_count={site_count}, source={d.get('source','unknown')}")
          EOF

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete old release + tag so we can recreate with the same name.
          # Validation step above guarantees the file is valid before we get here.
          gh release delete forecast-latest --cleanup-tag --yes 2>/dev/null || true
          gh release create forecast-latest forecast_cache.json \
            --title "Forecast Cache $(date -u +'%Y-%m-%d')" \
            --notes "Auto-updated $(date -u +'%Y-%m-%d %H:%M UTC') by GitHub Actions" \
            --latest=false
